services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:ollama
    container_name: open-web-ui
    ports:
      - "3000:8080"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      BYPASS_MODEL_ACCESS_CONTROL: True
    volumes:
      - ollama:/root/.ollama
      - open-webui:/app/backend/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  ollama:
  open-webui:
